target_path: "/World/beaker1"

max_episodes: 1

diagnostic:
  schema_version: 1
  protocol_id: "original_empty_beaker_contact_lift_v1"
  treatments: ["control", "instrumented_original", "zero_friction_ablation"]
  numpy_seed: 20260717
  physics_dt: 0.016666666666666666
  physics_dt_tolerance_s: 1.0e-12
  gravity_world_m_s2: [0.0, 0.0, -9.81]
  gravity_tolerance_m_s2: 1.0e-6
  stage_units_in_meters: 1.0
  physics_context_path: "/physicsScene"
  physics_scene_paths_in_traversal_order: ["/physicsScene", "/World/PhysicsScene"]
  maximum_production_steps: 1500
  child_timeout_seconds: 240
  retention_steps: 60
  source_reset_root_path: "/World/beaker2"
  source_body_path: "/World/beaker2/mesh"
  source_collider_path: "/World/beaker2/mesh"
  source_mass_kg: 0.019999999552965164
  source_mass_tolerance_kg: 1.0e-9
  support_collider_path: "/World/Cube"
  left_finger_body_path: "/World/Franka/panda_leftfinger"
  right_finger_body_path: "/World/Franka/panda_rightfinger"
  hand_body_path: "/World/Franka/panda_hand"
  tool_path: "/World/Franka/panda_hand/tool_center"
