  native_lift_target_m: 0.5
  rise_threshold_m: 0.12
  maximum_pre_lift_rise_m: 0.002
  maximum_ablation_rise_m: 0.02
  minimum_friction_anchor_norm_n_s: 1.0e-5
  maximum_zero_friction_anchor_norm_n_s: 1.0e-8
  maximum_source_tool_drift_translation_m: 0.005
  maximum_source_tool_drift_rotation_degrees: 5.0
  maximum_terminal_source_speed_m_s: 0.02
  maximum_terminal_source_angular_speed_degrees_s: 5.0
  settled_window_steps: 10
  settled_source_linear_speed_m_s: 0.001
  settled_source_angular_speed_degrees_s: 0.1
  settled_source_com_displacement_m: 0.0001
  maximum_finger_aperture_rate_m_s: 0.01
