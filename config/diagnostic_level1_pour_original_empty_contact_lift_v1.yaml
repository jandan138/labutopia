    minimum_inward_normal_cosine: 0.8
    maximum_opposing_normal_dot: -0.8
    maximum_vertical_normal_cosine: 0.25
    minimum_vessel_axis_antigravity_cosine: 0.95
    minimum_inner_face_alignment_cosine: 0.8
  comparison_tolerances:
    joint_position_rad: 1.0e-6
    joint_velocity_rad_s: 1.0e-5
    pose_position_m: 0.0001
    pose_rotation_degrees: 0.1
    linear_velocity_m_s: 0.001
    angular_velocity_degrees_s: 0.1
    contact_point_distance_m: 0.001
    contact_normal_angle_degrees: 0.1
    separation_m: 0.0001
    impulse_n_s: 1.0e-5
  contact_orientation_calibration:
    required: true
    impulse_actor: "runtime_calibration_required"
    normal_direction: "runtime_calibration_required"
  material_combine_priority: ["average", "min", "multiply", "max"]
  zero_friction_material_path: "/World/OriginalEmptyContactLiftProbe/ZeroFrictionMaterial"
  required_runtime_authority:
    live_solver_pair_materials: true
    contact_cache_and_warm_start: true
    collision_eligible_pair_matrix: true
    actor_order_orientation_calibration: true
  required_implementation_files:
